apiVersion: gh-infra/v1
kind: RepositorySet
metadata:
  owner: hirokisakabe

defaults:
  spec:
    features:
      wiki: false
      projects: false
      discussions: false
    merge_strategy:
      auto_delete_head_branches: true
    branch_protection:
      - pattern: main
        required_reviews: 0
        enforce_admins: true
        allow_force_pushes: false
        allow_deletions: false

repositories:
  # --- インフラ・設定 ---
  - name: github-config
    spec:
      security:
        vulnerability_alerts: true
        automated_security_fixes: true
  - name: dotfiles
    spec:
      topics: [dotfiles]
      security:
        vulnerability_alerts: true
        automated_security_fixes: true

  # --- Web サイト・コンテンツ ---
