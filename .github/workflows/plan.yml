name: Plan

# repos/ 以下または本 workflow 自体に変更がある PR でのみ起動する。
# rate limit 消費が大きい `gh infra plan` を常に走らせない設計。
# 詳細は README の「plan / apply の運用」を参照。
on:
  pull_request:
    branches: [main]
    paths:
      - 'repos/**'
      - '.github/workflows/plan.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'plan の対象 path (file または directory)。省略時は ./repos/ 全体。'
        required: false
        default: './repos/'

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      TARGET: ${{ github.event.inputs.target || './repos/' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install gh-infra
        env:
          GH_TOKEN: ${{ secrets.GH_INFRA_TOKEN }}
        run: gh extension install babarot/gh-infra

      - name: Validate
        env:
          GH_TOKEN: ${{ secrets.GH_INFRA_TOKEN }}
        run: gh infra validate "$TARGET"

      - name: Check rate limit (before)
        env:
          GH_TOKEN: ${{ secrets.GH_INFRA_TOKEN }}
        run: |
          info=$(gh api rate_limit --jq '.resources.core')
          remaining=$(echo "$info" | jq -r '.remaining')
          used=$(echo "$info" | jq -r '.used')
          reset=$(echo "$info" | jq -r '.reset')
          reset_iso=$(date -u -d "@$reset" '+%Y-%m-%dT%H:%M:%SZ')
          echo "::notice::Rate limit before plan: remaining=$remaining used=$used reset=$reset_iso"
          if [ "$remaining" -lt 1000 ]; then
            echo "::error::Rate limit too low (remaining=$remaining < 1000) to start plan safely. Reset at $reset_iso. Rerun after reset."
            exit 1
          fi

      - name: Plan
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GH_INFRA_TOKEN }}
        run: |
          set +e
          set -o pipefail
          raw=$(gh infra plan "$TARGET" 2>&1 | sed 's/\x1B\[[0-9;]*[mK]//g')
          status=$?

          # OSCエスケープシーケンス（ターミナル用ハイパーリンク: BEL終端またはST終端）を除去
          cleaned=$(printf '%s\n' "$raw" | perl -pe 's/\x1b\]8;;.*?(?:\x07|\x1b\\)//g')

          if [ "$status" -eq 0 ] && printf '%s\n' "$cleaned" | grep -q '^No changes\.'; then
            output="No changes. Infrastructure is up-to-date."
          else
            summary=$(printf '%s\n' "$cleaned" | grep -E '^Plan: ')
            body=$(printf '%s\n' "$cleaned" \
              | grep -vE '^[[:space:]]+[^[:space:]]+/[^[:space:]]+\.\.\.$' \
              | grep -vE '^(Reading desired state|Fetching current state) from' \
              | grep -vE '^Plan: ' \
              | grep -vE '^To apply, run:' \
              | awk '/^[[:space:]]*$/{blank++; next} {if(printed && blank>0) print ""; blank=0; printed=1; print}')
            if [ -n "$summary" ]; then
              output=$(printf '%s\n\n%s' "$summary" "$body")
            else
              output="$body"
            fi
          fi

          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -qiE 'API rate limit exceeded|rate limit.*(403|exceeded)'; then
            info=$(gh api rate_limit --jq '.resources.core')
            reset=$(echo "$info" | jq -r '.reset')
            reset_iso=$(date -u -d "@$reset" '+%Y-%m-%dT%H:%M:%SZ')
            echo "::error::gh infra plan hit GitHub API rate limit. Reset at $reset_iso. Do not retry until then; rerun this job after reset."
            exit 1
          fi
          exit "$status"

      - name: Check rate limit (after)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_INFRA_TOKEN }}
        run: |
          info=$(gh api rate_limit --jq '.resources.core')
          remaining=$(echo "$info" | jq -r '.remaining')
          used=$(echo "$info" | jq -r '.used')
          reset=$(echo "$info" | jq -r '.reset')
          reset_iso=$(date -u -d "@$reset" '+%Y-%m-%dT%H:%M:%SZ')
          echo "::notice::Rate limit after plan: remaining=$remaining used=$used reset=$reset_iso"

      - name: Comment plan result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### gh-infra plan

            \`\`\`
            ${{ steps.plan.outputs.output }}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
